<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule a Debrief</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card">
    <div class="decor">🎀 💌 🎀</div>

    <h1>so... when are you free?</h1>

    <p>
      please select a suitable time to discuss
      important matters, gossip and questionable decisions.

    <button onclick="submitPlan()">submit availability ✨</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
