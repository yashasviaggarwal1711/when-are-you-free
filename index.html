<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debrief Request</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6ea, #fff1f8);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      width: 88%;
      max-width: 620px;
      background: white;
      padding: 48px;
      border-radius: 36px;
      text-align: center;
      box-shadow: 0 25px 70px rgba(214, 70, 145, 0.22);
    }

    .badge {
      display: inline-block;
      background: #fff0f8;
      color: #e84fa0;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .decor {
      font-size: 34px;
    }

    h1 {
      font-size: 46px;
      color: #2d2d2d;
      text-transform: lowercase;
    }

    p {
      font-size: 22px;
      color: #666;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 20px;
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      color: white;
      font-size: 23px;
      font-weight: bold;
      cursor: pointer;
    }

    .yes-button {
      background: linear-gradient(135deg, #ff5bae, #ec4fa0);
    }

    .no-button {
      background: #f8a8cf;
    }

    .moving {
      position: fixed;
      width: 210px;
      z-index: 1000;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 22px;
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: 2px solid #f2d3e4;
      font-size: 20px;
      box-sizing: border-box;
    }

    .notice {
      margin-top: 30px;
      padding: 25px;
      border-radius: 20px;
      background: #fff3f9;
      text-align: left;
      font-size: 20px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="card" id="app">
    <div class="badge">official debrief portal</div>
    <div class="decor">🎀 📋 🎀</div>

    <h1>do you want to debrief?</h1>

    <p>please answer this simple and legally straightforward question.</p>

    <button class="yes-button" onclick="showLoadingScreen()">yes</button>

    <button class="no-button" id="noButton" onclick="handleNoClick()">no</button>
  </div>

  <script>
    const loadingMessages = [
      "reviewing application...",
      "consulting legal...",
      "consulting strategic advisors...",
      "consulting absolutely nobody...",
      "conducting due diligence...",
      "due diligence completed...",
      "findings disregarded...",
      "decision made...",
      "application status: approved"
    ];

    const noMessages = [
      "are you sure",
      "that's unfortunate",
      "please answer correctly",
      "interesting",
      "concerning",
      "deeply concerning",
      "your response has been noted",
      "for legal reasons",
      "🚓",
      "a report has been filed",
      "too late now",
      "yes"
    ];

    let noIndex = 0;

    function handleNoClick() {
      const button = document.getElementById("noButton");

      button.innerText = noMessages[noIndex];

      if (noIndex < noMessages.length - 1) {
        noIndex++;
      }

      const x = Math.random() * (window.innerWidth - 230);
      const y = Math.random() * (window.innerHeight - 100);

      button.classList.add("moving");
      button.style.left = x + "px";
      button.style.top = y + "px";
    }

    function showLoadingScreen() {
      const app = document.getElementById("app");

      app.innerHTML = `
        <div class="decor">⚖️ 📋 ⚖️</div>
        <h1 id="loadingText">reviewing application...</h1>
      `;

      let index = 0;

      const interval = setInterval(() => {
        index++;

        if (index < loadingMessages.length) {
          document.getElementById("loadingText").innerHTML = loadingMessages[index];
        } else {
          clearInterval(interval);
          showCalendarForm();
        }
      }, 850);
    }

    function showCalendarForm() {
      const app = document.getElementById("app");

      app.innerHTML = `
        <div class="badge">official debrief portal</div>
        <div class="decor">☕ 🎀 📋</div>

        <h1>so... when are you free?</h1>

        <p>your application has been approved. please select a suitable date and time.</p>

        <label for="date">date</label>
        <input type="date" id="date">

        <label for="time">time</label>
        <input type="time" id="time">

        <button class="yes-button" onclick="submitPlan()">schedule debrief</button>

        <div id="result"></div>
      `;
    }

    function submitPlan() {
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;
      const result = document.getElementById("result");

      if (!date || !time) {
        result.innerHTML = "application incomplete. additional documentation required.";
        return;
      }

      result.innerHTML = `
        <div class="notice">
          <strong>OFFICIAL DEBRIEF SUMMONS</strong>
          <br><br>
          Application Status: Approved
          <br><br>
          Attendance: Expected
          <br><br>
          Date: ${date}
          <br><br>
          Time: ${time}
          <br><br>
          Items Required: Updates
          <br><br>
          Recommended: Screenshots
          <br><br>
          Appeals Process: Unavailable
        </div>
      `;
    }
  </script>

</body>
</html>
